input:
  video_path: data/DJI_20000710120811_0008_D.LRF
  bag_path: data/limo_mission_20260525_214255_0.db3
  metadata_path: data/metadata.yaml
  homography_path: configs/homography.yaml

output:
  path: outputs/preview_10s.mp4

render:
  mode: wide_with_map
  start_sec: 0.0
  end_sec: null
  max_frames: null
  fps: null
  video_sampling: blend
  resize_height: null
  codec: mp4v

sync:
  time_offset_sec: 0.0
  time_scale: 1.0
  sample_at_source_frame_time: true

map:
  display_transform: rotate_ccw_90

world:
  x_min: -2.0
  x_max: 2.0
  y_min: -2.0
  y_max: 2.0

base_area:
  x_min: -2.0
  x_max: -0.5
  y_min: 0.5
  y_max: 2.0

topics:
  fire_state: /world/fire/state
  target_state: /world/target/state
  base_pose: /world/base/pose

robots:
  - id: Rescue_Limo_1
    role: rescue
    label: Rescue Limo 1
    short_label: R
    pose_topic: /Rescue_Limo_1/pose_world

  - id: Fire_Limo_1
    role: fire
    label: Fire Limo 1
    short_label: F1
    pose_topic: /Fire_Limo_1/pose_world

  - id: Fire_Limo_2
    role: fire
    label: Fire Limo 2
    short_label: F2
    pose_topic: /Fire_Limo_2/pose_world

objects:
  targets:
    - id: Target_1
      x: 1.0
      y: 1.0
      active: true
    - id: Target_2
      x: 1.0
      y: -1.0
      active: true
  fires:
    - id: Fire_1
      x: 0.5
      y: 1.5
      active: true
    - id: Fire_2
      x: 0.5
      y: -0.5
      active: true
    - id: Fire_3
      x: 1.2
      y: 1.2
      active: false
    - id: Fire_4
      x: -1.0
      y: -1.0
      active: false

visual:
  draw_video_overlay: true
  draw_map: true
  draw_connectors: true
  draw_video_robot_rings: false
  fire_suppress_duration_sec: 2.0
  video_robot_ring_radius_px: 26
  video_robot_ring_thickness_px: 3
  video_robot_ellipse_ratio: 0.55
  video_robot_ring_radius_m: 0.18
  video_robot_ring_length_m: 0.50
  video_robot_ring_width_m: 0.34
  video_fire_radius_px: 24
  video_fire_radius_m_default: 0.2
  video_fire_radius_m_scale: 1.0
  video_target_size_px: 18
  video_target_half_size_m: 0.08
  video_robot_label_offset_px: [0, -22]
  video_robot_label_offset_px_by_id:
    Rescue_Limo_1: [26, -30]
    Fire_Limo_1: [-44, -24]
    Fire_Limo_2: [0, -26]
  video_robot_label_close_distance_px: 150
  video_robot_label_separation_px: 58
  draw_video_label_leaders: true
  video_label_leader_min_distance_px: 34
  video_label_leader_alpha: 0.38
  map_robot_shape: car
  map_robot_length_px: 34
  map_robot_width_px: 22
  map_fire_radius_px: 18
  map_target_size_px: 18
  map_target_rotation_deg: -30.0
  alpha_base: 0.20
  alpha_base_robot_bonus: 0.02
  alpha_base_max: 0.34
  alpha_fire: 0.48
  alpha_connector: 0.24
  info_panel_enabled: true
  info_panel_height_ratio: 0.28
  pose_smoothing_tau_sec: 0.06
  pose_preprocess_enabled: true
  pose_cluster_dt_sec: 0.002
  pose_filter_max_speed_mps: 2.4
  pose_filter_step_margin_m: 0.04
  pose_preprocess_window_sec: 0.18
  rescue_safe_radius_m: 1.0
  video_safe_radius_x_scale: 0.75
  video_safe_radius_y_scale: 1.25
  video_safe_radius_yaw_deg: -8.0
  video_ground_shear_x_per_y: -0.08
  fire_suppress_start_distance_m: 0.2
  fire_suppress_max_window_sec: 10.0
  fire_suppress_min_duration_sec: 1.0
  video_robot_refine_enabled: false
  video_robot_refine_roles: [rescue, fire]
  video_robot_refine_search_px: 80
  video_robot_refine_max_shift_px: 90
  video_robot_refine_search_px_by_role:
    rescue: 48
    fire: 82
  video_robot_refine_max_shift_px_by_role:
    rescue: 34
    fire: 90
  video_robot_refine_min_area_px_by_role:
    rescue: 55
    fire: 45
  draw_robot_links: true
  alpha_robot_link: 0.30
  robot_link_color_bgr: [218, 222, 220]
  draw_robot_trails: false
  trail_duration_sec: 1.2
  trail_step_sec: 0.25
  map_robot_ring_radius_px: 24
  map_robot_ring_thickness_px: 2
  map_fire_radius_m_scale: 0.7
